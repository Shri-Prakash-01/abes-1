{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="profile-card slide-up">
        <h2>User Profile</h2>
        
        <div class="profile-info">
            <div class="info-group">
                <label>Username:</label>
                <p>{{ user.username }}</p>
            </div>
            
            <div class="info-group">
                <label>Email:</label>
                <p>{{ user.email }}</p>
            </div>
            
            <div class="info-group">
                <label>Role:</label>
                <p>{{ user.role }}</p>
            </div>
            
            <div class="info-group">
                <label>Member Since:</label>
                <p>{{ user.created_at.strftime('%B %d, %Y') }}</p>
            </div>
            
            <div class="info-group">
                <label>Documents:</label>
                <p>{{ user.documents|length }}</p>
            </div>
        </div>
        
        <div class="profile-actions">
            <a href="{{ url_for('doc.dashboard') }}" class="btn">Back to Dashboard</a>
        </div>
    </div>
</div>

<style>
.profile-card {
    max-width: 600px;
    margin: 2rem auto;
    padding: 2rem;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.profile-card h2 {
    color: #333;
    margin-bottom: 2rem;
    text-align: center;
    font-size: 2em;
}

.profile-info {
    margin-bottom: 2rem;
}

.info-group {
    display: flex;
    padding: 1rem;
    border-bottom: 1px solid #e0e0e0;
}

.info-group label {
    width: 150px;
    font-weight: 600;
    color: #666;
}

.info-group p {
    flex: 1;
    color: #333;
}

.profile-actions {
    text-align: center;
}

.profile-actions .btn {
    display: inline-block;
    padding: 0.75rem 2rem;
}
</style>
{% endblock %}
