{% extends "base.html" %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: 'Poppins', sans-serif;
        padding: 20px;
        animation: gradientBG 15s ease infinite;
        background-size: 400% 400%;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .register-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        transform: translateY(0);
        animation: slideUp 0.8s ease-out;
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(50px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .register-card h2 {
        color: #333;
        font-size: 2.2em;
        margin-bottom: 30px;
        text-align: center;
        font-weight: 700;
        background: linear-gradient(45deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
        0% { background-position: -100%; }
        100% { background-position: 200%; }
    }

    .form-group {
        margin-bottom: 25px;
        position: relative;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: 500;
        font-size: 0.95em;
        transition: all 0.3s ease;
    }

    .form-group input {
        width: 100%;
        padding: 15px 20px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1em;
        transition: all 0.3s ease;
        background: white;
        font-family: 'Poppins', sans-serif;
    }

    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        transform: translateY(-2px);
    }

    .form-group input:hover {
        border-color: #764ba2;
    }

    .form-group.focused label {
        color: #667eea;
        transform: translateX(5px);
    }

    button[type="submit"] {
        width: 100%;
        padding: 16px;
        background: linear-gradient(45deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1.2em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        font-family: 'Poppins', sans-serif;
        letter-spacing: 1px;
    }

    button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    button[type="submit"]:active {
        transform: translateY(0);
    }

    button[type="submit"]::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        transition: left 0.5s ease;
    }

    button[type="submit"]:hover::before {
        left: 100%;
    }

    .login-link {
        text-align: center;
        margin-top: 25px;
        color: #666;
        font-size: 0.95em;
    }

    .login-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
        position: relative;
    }

    .login-link a:hover {
        color: #764ba2;
    }

    .login-link a::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background: linear-gradient(45deg, #667eea, #764ba2);
        transition: width 0.3s ease;
    }

    .login-link a:hover::after {
        width: 100%;
    }

    /* Floating animation for background elements */
    .floating-lock {
        position: absolute;
        font-size: 2em;
        opacity: 0.1;
        animation: float 6s ease-in-out infinite;
        pointer-events: none;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(10deg); }
    }

    /* Password strength indicator */
    .password-strength {
        height: 5px;
        background: #e0e0e0;
        border-radius: 5px;
        margin-top: 10px;
        overflow: hidden;
        transition: all 0.3s ease;
    }

    .strength-bar {
        height: 100%;
        width: 0;
        transition: width 0.3s ease, background 0.3s ease;
    }

    .strength-text {
        font-size: 0.8em;
        margin-top: 5px;
        text-align: right;
        color: #666;
    }
</style>

<div class="auth-container">
    <!-- Floating lock icons for background effect -->
    <div class="floating-lock" style="top: 10%; left: 10%;">🔒</div>
    <div class="floating-lock" style="top: 20%; right: 15%; animation-delay: 1s;">🔐</div>
    <div class="floating-lock" style="bottom: 15%; left: 20%; animation-delay: 2s;">🔑</div>
    
    <div class="register-card">
        <h2>Create Account</h2>
        
        <form method="POST" action="/auth/register" id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required 
                       placeholder="Choose a username">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required 
                       placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required 
                       placeholder="Create a strong password">
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-text" id="strengthText">Enter password</div>
            </div>

            <button type="submit">
                <span>Register Now</span>
                <i class="fas fa-arrow-right" style="margin-left: 10px;"></i>
            </button>
        </form>

        <div class="login-link">
            Already have an account? <a href="/auth/login">Sign In</a>
        </div>
    </div>
</div>

<script>
    // Password strength checker
    document.getElementById('password').addEventListener('input', function(e) {
        const password = e.target.value;
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        
        let strength = 0;
        
        if (password.length >= 8) strength++;
        if (password.match(/[a-z]/)) strength++;
        if (password.match(/[A-Z]/)) strength++;
        if (password.match(/[0-9]/)) strength++;
        if (password.match(/[^a-zA-Z0-9]/)) strength++;
        
        const width = (strength / 5) * 100;
        strengthBar.style.width = width + '%';
        
        let color, text;
        if (strength <= 2) {
            color = '#ff4444';
            text = 'Weak password';
        } else if (strength <= 4) {
            color = '#ffaa00';
            text = 'Medium password';
        } else {
            color = '#00c851';
            text = 'Strong password';
        }
        
        strengthBar.style.background = color;
        strengthText.style.color = color;
        strengthText.textContent = text;
    });

    // Input field animations
    document.querySelectorAll('.form-group input').forEach(input => {
        input.addEventListener('focus', function() {
            this.closest('.form-group').classList.add('focused');
        });
        
        input.addEventListener('blur', function() {
            this.closest('.form-group').classList.remove('focused');
        });
    });

    // Form submission animation
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const button = this.querySelector('button[type="submit"]');
        button.innerHTML = 'Creating Account... <i class="fas fa-spinner fa-spin"></i>';
        button.disabled = true;
    });
</script>
{% endblock %}
